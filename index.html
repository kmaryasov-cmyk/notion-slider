<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ноушн Слайдер</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-sizing: border-box;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #fff;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.32s ease;
            touch-action: pan-y;
            will-change: transform;
        }

        .slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            background: #fff;
            user-select: none;
            -webkit-user-drag: none;
            display: block;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 48px;
            padding: 0;
            border: none;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.18);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.32);
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(0.96);
        }

        .nav-btn:focus-visible,
        .dot:focus-visible {
            outline: 2px solid rgba(0, 0, 0, 0.55);
            outline-offset: 3px;
        }

        .nav-btn svg {
            width: 18px;
            height: 18px;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .prev {
            left: 18px;
        }

        .next {
            right: 18px;
        }

        .dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 22px;
            height: 22px;
            padding: 0;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
        }

        .dot::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.22);
            transition: width 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .dot[aria-current="true"]::before {
            width: 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
        }

        @media (max-width: 640px) {
            .nav-btn {
                width: 40px;
                height: 44px;
                border-radius: 12px;
            }

            .prev {
                left: 12px;
            }

            .next {
                right: 12px;
            }

            .dots {
                bottom: 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .slides,
            .nav-btn,
            .dot::before {
                transition: none;
            }
        }
    </style>
</head>

<body>
    <main
        class="slider-container"
        role="region"
        aria-roledescription="carousel"
        aria-label="Слайдер с изображениями исследования"
    >
        <div class="slides" id="slides" aria-live="polite">
            <img class="slide" src="https://drive.google.com/thumbnail?id=1LToRZu1PLFrk57jLYF3p8Thp1SfDXh_b&sz=w1200" alt="Слайд 1 из 7" loading="eager">
            <img class="slide" src="https://drive.google.com/thumbnail?id=1FihSre28733_xxLUTnUgzRaMGAm5neVC&sz=w1200" alt="Слайд 2 из 7" loading="lazy">
            <img class="slide" src="https://drive.google.com/thumbnail?id=1_TJDqWrYmJqairkRBnHPS1ZwxVcZDTAE&sz=w1200" alt="Слайд 3 из 7" loading="lazy">
            <img class="slide" src="https://drive.google.com/thumbnail?id=10rpm0NYMBS02nCuLBVJe2v6h0gwzoyuB&sz=w1200" alt="Слайд 4 из 7" loading="lazy">
            <img class="slide" src="https://drive.google.com/thumbnail?id=1hcJIKPYjfPwnDxkqDxXydPXAy9gWssMQ&sz=w1200" alt="Слайд 5 из 7" loading="lazy">
            <img class="slide" src="https://drive.google.com/thumbnail?id=1wJNatZlKVKHv8xYpFhnfikveBwgZC6E_&sz=w1200" alt="Слайд 6 из 7" loading="lazy">
            <img class="slide" src="https://drive.google.com/thumbnail?id=1bA_woXrzH_SxF1SNLVITUHd9YSmnpW0c&sz=w1200" alt="Слайд 7 из 7" loading="lazy">
        </div>

        <button class="nav-btn prev" type="button" onclick="moveSlide(-1)" aria-label="Предыдущий слайд">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 5L8 12L15 19"></path>
            </svg>
        </button>

        <button class="nav-btn next" type="button" onclick="moveSlide(1)" aria-label="Следующий слайд">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 5L16 12L9 19"></path>
            </svg>
        </button>

        <div class="dots" id="dots" aria-label="Навигация по слайдам"></div>
    </main>

    <script>
        let currentIndex = 0;

        const slides = document.getElementById('slides');
        const slideItems = document.querySelectorAll('.slide');
        const totalSlides = slideItems.length;
        const dotsContainer = document.getElementById('dots');

        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('button');

            dot.classList.add('dot');
            dot.type = 'button';
            dot.setAttribute('aria-label', `Перейти к слайду ${i + 1} из ${totalSlides}`);

            if (i === 0) {
                dot.setAttribute('aria-current', 'true');
            } else {
                dot.setAttribute('aria-current', 'false');
            }

            dot.addEventListener('click', () => goToSlide(i));
            dotsContainer.appendChild(dot);
        }

        const dots = document.querySelectorAll('.dot');

        function updateSlider() {
            slides.style.transform = `translateX(-${currentIndex * 100}%)`;

            dots.forEach((dot, index) => {
                dot.setAttribute('aria-current', index === currentIndex ? 'true' : 'false');
            });

            slideItems.forEach((slide, index) => {
                slide.setAttribute('aria-hidden', index === currentIndex ? 'false' : 'true');
            });
        }

        function moveSlide(direction) {
            currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
            updateSlider();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
        }

        let startX = 0;
        let isDragging = false;

        slides.addEventListener('touchstart', (event) => {
            startX = event.touches[0].clientX;
            isDragging = true;
        }, { passive: true });

        slides.addEventListener('touchend', (event) => {
            if (!isDragging) return;

            const endX = event.changedTouches[0].clientX;
            const diff = startX - endX;

            if (diff > 50) {
                moveSlide(1);
            } else if (diff < -50) {
                moveSlide(-1);
            }

            isDragging = false;
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                moveSlide(1);
            }

            if (event.key === 'ArrowLeft') {
                moveSlide(-1);
            }

            if (event.key === 'Home') {
                goToSlide(0);
            }

            if (event.key === 'End') {
                goToSlide(totalSlides - 1);
            }
        });

        updateSlider();
    </script>
</body>
