<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ноушн Слайдер</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-sizing: border-box;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        .slider-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: minmax(0, 1fr) 46px;
            background: #fff;
            overflow: hidden;
        }

        .slider-container:focus-visible {
            outline: 2px solid rgba(0, 0, 0, 0.45);
            outline-offset: -4px;
        }

        .viewer {
            min-height: 0;
            width: 100%;
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr) 48px;
            background: #fff;
        }

        .viewport {
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.32s ease;
            touch-action: pan-y;
            will-change: transform;
        }

        .slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            background: #fff;
            user-select: none;
            -webkit-user-drag: none;
            display: block;
        }

        .nav-rail {
            width: 100%;
            height: 100%;
            padding: 0;
            border: none;
            background: #fff;
            color: rgba(0, 0, 0, 0.52);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 10;
        }

        .nav-rail:hover {
            color: rgba(0, 0, 0, 0.78);
        }

        .nav-rail:focus-visible {
            outline: 2px solid rgba(0, 0, 0, 0.55);
            outline-offset: -4px;
        }

        .nav-icon {
            width: 32px;
            height: 40px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .nav-rail:hover .nav-icon {
            background: rgba(0, 0, 0, 0.10);
        }

        .nav-rail:active .nav-icon {
            transform: scale(0.96);
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .dots {
            width: 100%;
            min-height: 46px;
            padding-top: 8px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 6px;
            background: #fff;
        }

        .dot {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
        }

        .dot::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.24);
            transition: width 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .dot[aria-current="true"]::before {
            width: 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.74);
        }

        .dot:hover::before {
            background: rgba(0, 0, 0, 0.44);
        }

        .dot:focus-visible {
            outline: 2px solid rgba(0, 0, 0, 0.55);
            outline-offset: 2px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            .slider-container {
                grid-template-rows: minmax(0, 1fr) 44px;
            }

            .viewer {
                grid-template-columns: 44px minmax(0, 1fr) 44px;
            }

            .nav-icon {
                width: 30px;
                height: 38px;
                border-radius: 10px;
            }

            .dots {
                min-height: 44px;
                padding-top: 7px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .slides,
            .nav-icon,
            .dot::before {
                transition: none;
            }
        }
    </style>
</head>

<body>
    <main
        class="slider-container"
        role="region"
        aria-roledescription="carousel"
        aria-label="Слайдер с изображениями исследования"
        tabindex="0"
        id="carousel"
    >
        <div class="viewer">
            <button class="nav-rail prev" type="button" id="prevBtn" aria-label="Предыдущий слайд">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M15 5L8 12L15 19"></path>
                    </svg>
                </span>
            </button>

            <div class="viewport">
                <div class="slides" id="slides">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=1LToRZu1PLFrk57jLYF3p8Thp1SfDXh_b&sz=w1200" alt="Слайд 1 из 7" loading="eager" decoding="async" fetchpriority="high">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=1FihSre28733_xxLUTnUgzRaMGAm5neVC&sz=w1200" alt="Слайд 2 из 7" loading="lazy" decoding="async">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=1_TJDqWrYmJqairkRBnHPS1ZwxVcZDTAE&sz=w1200" alt="Слайд 3 из 7" loading="lazy" decoding="async">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=10rpm0NYMBS02nCuLBVJe2v6h0gwzoyuB&sz=w1200" alt="Слайд 4 из 7" loading="lazy" decoding="async">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=1hcJIKPYjfPwnDxkqDxXydPXAy9gWssMQ&sz=w1200" alt="Слайд 5 из 7" loading="lazy" decoding="async">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=1wJNatZlKVKHv8xYpFhnfikveBwgZC6E_&sz=w1200" alt="Слайд 6 из 7" loading="lazy" decoding="async">
                    <img class="slide" src="https://drive.google.com/thumbnail?id=1bA_woXrzH_SxF1SNLVITUHd9YSmnpW0c&sz=w1200" alt="Слайд 7 из 7" loading="lazy" decoding="async">
                </div>
            </div>

            <button class="nav-rail next" type="button" id="nextBtn" aria-label="Следующий слайд">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 5L16 12L9 19"></path>
                    </svg>
                </span>
            </button>
        </div>

        <nav class="dots" id="dots" aria-label="Навигация по слайдам"></nav>

        <div class="sr-only" id="slide-status" aria-live="polite"></div>
    </main>

    <script>
        let currentIndex = 0;

        const carousel = document.getElementById('carousel');
        const slides = document.getElementById('slides');
        const slideItems = document.querySelectorAll('.slide');
        const totalSlides = slideItems.length;
        const dotsContainer = document.getElementById('dots');
        const slideStatus = document.getElementById('slide-status');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('button');

            dot.classList.add('dot');
            dot.type = 'button';
            dot.setAttribute('aria-label', `Перейти к слайду ${i + 1} из ${totalSlides}`);
            dot.setAttribute('aria-current', i === 0 ? 'true' : 'false');

            dot.addEventListener('click', () => goToSlide(i));
            dotsContainer.appendChild(dot);
        }

        const dots = document.querySelectorAll('.dot');

        function updateSlider() {
            slides.style.transform = `translateX(-${currentIndex * 100}%)`;

            dots.forEach((dot, index) => {
                dot.setAttribute('aria-current', index === currentIndex ? 'true' : 'false');
            });

            slideItems.forEach((slide, index) => {
                slide.setAttribute('aria-hidden', index === currentIndex ? 'false' : 'true');
            });

            slideStatus.textContent = `Показан слайд ${currentIndex + 1} из ${totalSlides}`;
        }

        function moveSlide(direction) {
            currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
            updateSlider();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
        }

        prevBtn.addEventListener('click', () => moveSlide(-1));
        nextBtn.addEventListener('click', () => moveSlide(1));

        let startX = 0;
        let isDragging = false;

        slides.addEventListener('touchstart', (event) => {
            startX = event.touches[0].clientX;
            isDragging = true;
        }, { passive: true });

        slides.addEventListener('touchend', (event) => {
            if (!isDragging) return;

            const endX = event.changedTouches[0].clientX;
            const diff = startX - endX;

            if (diff > 50) {
                moveSlide(1);
            } else if (diff < -50) {
                moveSlide(-1);
            }

            isDragging = false;
        });

        carousel.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                event.preventDefault();
                moveSlide(1);
            }

            if (event.key === 'ArrowLeft') {
                event.preventDefault();
                moveSlide(-1);
            }

            if (event.key === 'Home') {
                event.preventDefault();
                goToSlide(0);
            }

            if (event.key === 'End') {
                event.preventDefault();
                goToSlide(totalSlides - 1);
            }
        });

        updateSlider();
    </script>
</body>
</html>
