<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ноушн Слайдер</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-sizing: border-box;
        }

        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 8px;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-in-out;
            touch-action: pan-y;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            -webkit-user-drag: none;
        }

        .btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
            border-radius: 50%;
            user-select: none;
            font-size: 18px;
            transition: background 0.2s;
            z-index: 10;
        }
        
        .btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        
        .prev { left: 15px; }
        .next { right: 15px; }

        .dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dot.active {
            background: #fff;
        }
    </style>
</head>
<body>

<div class="slider-container">
    <div class="slides" id="slides">
        <img class="slide" src="https://drive.google.com/thumbnail?id=1LToRZu1PLFrk57jLYF3p8Thp1SfDXh_b&sz=w1200" alt="Слайд 1">
        <img class="slide" src="https://drive.google.com/thumbnail?id=1FihSre28733_xxLUTnUgzRaMGAm5neVC&sz=w1200" alt="Слайд 2">
        <img class="slide" src="https://drive.google.com/thumbnail?id=1_TJDqWrYmJqairkRBnHPS1ZwxVcZDTAE&sz=w1200" alt="Слайд 3">
        <img class="slide" src="https://drive.google.com/thumbnail?id=10rpm0NYMBS02nCuLBVJe2v6h0gwzoyuB&sz=w1200" alt="Слайд 4">
        <img class="slide" src="https://drive.google.com/thumbnail?id=1hcJIKPYjfPwnDxkqDxXydPXAy9gWssMQ&sz=w1200" alt="Слайд 5">
        <img class="slide" src="https://drive.google.com/thumbnail?id=1wJNatZlKVKHv8xYpFhnfikveBwgZC6E_&sz=w1200" alt="Слайд 6">
        <img class="slide" src="https://drive.google.com/thumbnail?id=1bA_woXrzH_SxF1SNLVITUHd9YSmnpW0c&sz=w1200" alt="Слайд 7">
    </div>
    <button class="btn prev" onclick="moveSlide(-1)">&#10094;</button>
    <button class="btn next" onclick="moveSlide(1)">&#10095;</button>
    <div class="dots" id="dots"></div>
</div>

<script>
    let currentIndex = 0;
    const slides = document.getElementById('slides');
    const totalSlides = document.querySelectorAll('.slide').length;
    const dotsContainer = document.getElementById('dots');

    for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (i === 0) dot.classList.add('active');
        dot.addEventListener('click', () => goToSlide(i));
        dotsContainer.appendChild(dot);
    }
    const dots = document.querySelectorAll('.dot');

    function updateSlider() {
        slides.style.transform = `translateX(-${currentIndex * 100}%)`;
        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentIndex);
        });
    }

    function moveSlide(direction) {
        currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
        updateSlider();
    }

    function goToSlide(index) {
        currentIndex = index;
        updateSlider();
    }

    let startX = 0;
    let isDragging = false;

    slides.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDragging = true;
    });

    slides.addEventListener('touchend', (e) => {
        if (!isDragging) return;
        let endX = e.changedTouches[0].clientX;
        let diff = startX - endX;

        if (diff > 50) {
            moveSlide(1);
        } else if (diff < -50) {
            moveSlide(-1);
        }
        isDragging = false;
    });
</script>

</body>
</html>
